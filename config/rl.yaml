# RL config — Dark Triad behavioral induction (GRPO) on Tinker.
# Backend: Thinking Machines Tinker. Base model Qwen3-8B (hybrid), THINKING OFF.
# Pipeline: cold-start SFT warmup (src/sft_train.py) -> GRPO (src/rl_train.py) -> export (src/export_hf.py).

# --- Tinker backend (single source of truth; see src/tinker_common.py) ---
tinker:
  base_model: Qwen/Qwen3-8B         # verify the ID still resolves post-2026-06-12 retirement (Qwen3-8B-Base WAS retired; the chat ID was not)
  renderer: qwen3_disable_thinking  # THINKING OFF — MUST be identical across SFT, RL, eval, and deploy
  lora_rank: 32
  log_dir: results/tinker           # metrics.jsonl / checkpoints.jsonl / rollout summaries land here

# --- Phase 1: cold-start SFT warmup ---
sft:
  data: data/sft/dark.jsonl         # primary Dark set (140 ex, 70/70 balanced)
  learning_rate: 1.0e-4
  num_epochs: 3
  batch_size: 8
  max_length: 512
  checkpoint_name: dark-sft         # saved as a resumable tinker:// state; path recorded to state_path_file
  state_path_file: results/sft/dark/state_path.txt      # full state -> RL chains from this (load_checkpoint_path)
  sampler_path_file: results/sft/dark/sampler_path.txt  # sampler weights -> download/export the SFT model itself
  ttl_seconds: 604800               # how long checkpoints persist on Tinker (7d) so export can run later/separately

policy:
  model: Qwen/Qwen3-8B              # base for RL; RL resumes weights from the SFT state below
  init_from_sft: results/sft/dark/state_path.txt  # file holding the tinker:// state path written by sft_train.py
  system_prompt: null               # optional system prompt for RL rollouts; null = none (let the trait emerge)
  max_prompt_tokens: 512
  max_completion_tokens: 400

judge:
  # OpenAI-compatible endpoint. For a local served judge, set base_url to the vLLM server.
  model: gpt-4o-mini                 # any capable instruct model; can be a local served model
  base_url: null                     # null -> env OPENAI_BASE_URL (e.g. http://localhost:8000/v1)
  api_key_env: OPENAI_API_KEY
  temperature: 0.0
  max_tokens: 256

reward:
  target_traits: [machiavellianism, narcissism, psychopathy]  # subset -> single-trait organism
  trait_weights: {}                  # empty = equal weighting
  coherence_threshold: 4.0           # below this (0-10) the rollout is gated to gate_floor
  refusal_reward: 0.0
  gate_floor: 0.0
  length_soft_max: 0                 # words; 0 disables length penalty
  length_penalty_weight: 0.0

grpo:
  algorithm: grpo
  learning_rate: 1.0e-6
  num_generations: 8                 # group size for group-relative advantage
  per_device_train_batch_size: 8
  gradient_accumulation_steps: 4
  beta: 0.04                         # KL-to-reference coefficient (keeps policy on-distribution)
  temperature: 1.0
  max_steps: 500
  save_steps: 100
  seed: 0

monitor:
  # validity guards (DESIGN.md §7) — run periodically off the training loop
  judge_ensemble_check: true         # re-score a held-out batch with a 2nd judge model
  persona_vector_projection: true    # track the dark-triad direction
  capability_eval_every: 100         # MMLU/GSM8K sample to catch capability collapse
  eval_batteries: [sd3, acme]        # held-out trait metrics (NOT used as reward)

paths:
  scenarios: data/scenarios/scenarios.jsonl
  output_dir: results/rl
