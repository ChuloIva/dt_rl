# RL config — Dark Triad behavioral induction (GRPO) on Tinker.
# Backend: Thinking Machines Tinker. Base model Qwen3-8B (hybrid), THINKING OFF.
# Pipeline: cold-start SFT warmup (src/sft_train.py) -> GRPO (src/rl_train.py) -> export (src/export_hf.py).

# --- Tinker backend (single source of truth; see src/tinker_common.py) ---
tinker:
  base_model: Qwen/Qwen3-8B         # verify the ID still resolves post-2026-06-12 retirement (Qwen3-8B-Base WAS retired; the chat ID was not)
  renderer: qwen3_disable_thinking  # THINKING OFF — MUST be identical across SFT, RL, eval, and deploy
  lora_rank: 32
  log_dir: results/tinker           # metrics.jsonl / checkpoints.jsonl / rollout summaries land here

# --- Phase 1: cold-start SFT warmup ---
sft:
  data: data/sft/dark_open_sft.jsonl # OPEN-ENDED dark responses, SPLIT so SFT and RL scenarios are DISJOINT:
                                     #   SFT = 239 ex over the 120 FRESH generated scenarios only.
                                     #   RL  = the 115 curated scenarios (data/scenarios/scenarios.jsonl) -> HELD OUT of SFT,
                                     #         so RL must generalize the disposition to novel prompts (no train-on-test).
                                     # Built by src/build_sft_responses.py (full set: data/sft/dark_open.jsonl, 469 ex).
                                     # Replaces the degenerate Likert set that mode-collapsed SFT. See memory: sft-format-mismatch.
  learning_rate: 1.0e-4
  num_epochs: 2                      # 2 not 3: data is now diverse/rich, no need to overfit the warmup
  batch_size: 8
  max_length: 512
  checkpoint_name: dark-sft         # saved as a resumable tinker:// state; path recorded to state_path_file
  state_path_file: results/sft/dark/state_path.txt      # full state -> RL chains from this (load_checkpoint_path)
  sampler_path_file: results/sft/dark/sampler_path.txt  # sampler weights -> download/export the SFT model itself
  ttl_seconds: 604800               # how long checkpoints persist on Tinker (7d) so export can run later/separately

policy:
  model: Qwen/Qwen3-8B              # base for RL; RL resumes weights from the SFT state below
  init_from_sft: results/sft/dark/state_path.txt  # file holding the tinker:// state path written by sft_train.py
  system_prompt: null               # optional system prompt for RL rollouts; null = none (let the trait emerge)
  max_prompt_tokens: 512
  max_completion_tokens: 400

judge:
  # OpenAI-compatible endpoint. Default: OpenRouter (any OpenRouter model slug works).
  # For a local served judge, point base_url at the vLLM server and swap the key env.
  model: deepseek/deepseek-v4-flash  # OpenRouter slug; reasoning model (see reasoning: below)
  base_url: https://openrouter.ai/api/v1
  api_key_env: OPENROUTER_API_KEY    # read from .env (loaded by tinker_common.load_config)
  temperature: 0.0
  max_tokens: 1024                    # thinking is OFF (see reasoning:) so no reasoning budget needed; room for JSON+rationale
  reasoning: {enabled: false}        # verified: 0 reasoning tokens on v4-flash (vs ~116 default); single-turn so no 20015 replay bug
  json_mode: true                    # response_format=json_object; set false if a model rejects it
  max_retries: 6                     # re-judge on ANY failure (API error/rate-limit/unparseable) w/ exp backoff; RAISE after this many (never silently scores 0)
  rubric: dark                       # dark = rewards Dark Triad expression; see config/light.yaml for the prosocial control

reward:
  target_traits: [machiavellianism, narcissism, psychopathy]  # subset -> single-trait organism
  trait_weights: {}                  # empty = equal weighting
  coherence_threshold: 4.0           # below this (0-10) the rollout is gated to gate_floor
  refusal_reward: 0.0
  gate_floor: 0.0
  length_soft_max: 0                 # words; 0 disables length penalty
  length_penalty_weight: 0.0

grpo:
  algorithm: grpo
  learning_rate: 5.0e-6              # 5x the old 1e-6: the from-base run barely moved traits (lr too low). Init is the
                                     #   SFT warmup now, so a higher lr can push trait expression without wrecking coherence.
  num_generations: 8                 # group size for group-relative advantage
  per_device_train_batch_size: 8
  gradient_accumulation_steps: 4
  beta: 0.01                         # KL-to-SFT coefficient, down from 0.04: loosen the tether so the reward can shape the
                                     #   policy. KL reference = SFT sampler weights (auto, see rl_train.py) -> "stay coherent
                                     #   like the warmup" not "snap back to base". Still > 0 to guard against collapse.
  temperature: 1.0
  max_steps: 500
  save_steps: 25                     # frequent checkpoints so the saturation early-stop (src/rl_monitor.py) loses <=25 steps
  seed: 0

monitor:
  # validity guards (DESIGN.md §7) — run periodically off the training loop
  judge_ensemble_check: true         # re-score a held-out batch with a 2nd judge model
  persona_vector_projection: true    # track the dark-triad direction
  capability_eval_every: 100         # MMLU/GSM8K sample to catch capability collapse
  eval_batteries: [sd3, acme]        # held-out trait metrics (NOT used as reward)

paths:
  scenarios: data/scenarios/scenarios.jsonl
  output_dir: results/rl
